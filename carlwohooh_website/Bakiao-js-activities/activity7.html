<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 7</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px;}
        .box { max-width: 420px; padding: 10px; margin: 10px 0; font-size: 16px;}
        input { width: 100%;padding: 10px;margin: 10px 0; font-size: 16px;}
        button {padding: 10px 14px; font-size: 16px; cursor: pointer;}
        #output {margin-top: 12px; font-weight: bold;}
    </style>
</head>
<body>
    <h1> Activity 7: Functions (Greeting)</h1>

    <div class="box">
        <label for="nameInput">Enter your Name</label>
        <input type="text" id="nameInput" placeholder="e.g., Maria">

        <button onclick="showGreeting()">Greet</button>

        <p id="output">Output: ____</p>
    </div>

    <script>
        function greet (name)   {
            return "Hello, " + name + "!";
        }

        function showGreeting() {
            const name = document.getElementById("nameInput").value.trim();
            const outputEl = document.getElementById("output");

            if (name === "")    {
                outputEl.textContent = "Output: Please enter a name.";
                return;
            }
            outputEl.textContent = "Output: " + greet (name);
        }
    </script>
</body>
</html>
